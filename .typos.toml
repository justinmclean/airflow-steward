# Typos spell-checker config for apache/magpie.
#
# Run locally:
#   typos
#
# Auto-fix what's safe:
#   typos --write-changes
#
# Run in CI: see `.github/workflows/doc-validation.yml`.

[default]
# Ignore git commit hashes (backtick-wrapped hex, 7-40 chars) — they
# routinely contain letter runs typos reads as words (e.g. `9331fb2ba`
# → `ba`). Matches the `In-flight` table's `Implemented by` column.
extend-ignore-re = ["`[0-9a-f]{7,40}`"]

[default.extend-words]
# Domain terms typos' default dictionary flags as misspellings.
# `CNA` = CVE Numbering Authority — used hundreds of times in the
# security documentation; not a typo of "CAN".
CNA = "CNA"
cna = "cna"
Cna = "Cna"
# `Nd` is the placeholder for "N days" in date-filter syntax
# (`newer_than:<Nd>`, `lte=Nd`, etc); not a typo of "And".
Nd = "Nd"
# `mis-` prefix in `mis-allocation` is a legitimate compound, not a
# typo of "miss" / "mist".
mis = "mis"
# `pre-empted` is a real word; typos flags `empted` as a typo of
# `emptied` only because of how it splits hyphenated words.
empted = "empted"
# Bracket-prefix CLI prompt fragments — `[B]ody`, `[R]equest`,
# `[A]pprove`, `[E]dit`, etc. — used as keyboard-shortcut hints in
# the pr-* skills' interactive prompts. typos sees the residual
# (`ody`, `equest`, `pprove`, `dit`) as misspellings.
ody = "ody"
equest = "equest"
efresh = "efresh"
pprove = "pprove"
omment = "omment"
ebase = "ebase"
ost = "ost"
raft = "raft"
verride = "verride"
dit = "dit"
ick = "ick"
kip = "kip"
lose = "lose"
# `asert` is a GitHub-handle suffix — Paul King's handle is
# `paulk-asert` (Groovy / Grails / Incubator PMC member, listed
# in `.asf.yaml` collaborators). typos flags it as a typo of
# `assert`.
asert = "asert"
# `Drob` is a surname — Mike Drob (Accumulo / Curator / HBase /
# Lucene / Solr PMC member, listed in the MISSION.md roster).
# typos flags it as a typo of `Drop`.
Drob = "Drob"
# `firt` is Fossil's literal database column name for "forum in reply to"
firt = "firt"

[default.extend-identifiers]
# Identifiers that look like typos but are real symbol names.
ASF = "ASF"
PMC = "PMC"
CVE = "CVE"
CWE = "CWE"
Vulnogram = "Vulnogram"
ponymail = "ponymail"
ponymail_mcp = "ponymail_mcp"
gh = "gh"
mcp = "mcp"
MCP = "MCP"
# `ERRO` is docker / containerd / nerdctl's literal truncated log
# level — appears in CLI output as `ERRO[0000] …`. Quoted verbatim
# in `docs/setup/sandbox-troubleshooting.md` so grep on the real
# error string matches the doc entry.
ERRO = "ERRO"

[files]
# Skip auto-generated lockfiles + the cargo-style pinned-versions
# manifest (URLs / hashes that are not natural-language text).
extend-exclude = [
  "uv.lock",
  "tools/*/uv.lock",
  "tools/agent-isolation/pinned-versions.toml",
  "*.svg",
]
