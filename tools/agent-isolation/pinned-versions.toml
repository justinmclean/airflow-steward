# pinned-versions.toml
#
# Pinned upstream versions of the host-system tools the secure agent
# setup depends on. The pin shape mirrors the framework's broader
# cooldown convention (see `[tool.uv] exclude-newer = "7 days"` in
# the root pyproject.toml and the dependabot weekly cooldown of 7
# days in `.github/dependabot.yml`): every entry below names a
# version that was released **at least `cooldown_days` ago at the
# time the entry was last touched**, so an upstream retag /
# withdrawal / fix-forward has had time to settle before adopters
# install it.
#
# Cooldown is **per-tool** with a 7-day default. A tool with an
# unusually well-watched release stream can override the default
# via `cooldown_days = N` in its `[tools.<name>]` table. Lowering
# the cooldown trades settle-time for currency; raise it back if a
# tool starts shipping pre-release fix-forwards routinely.
#
# `claude-code` is deliberately **not pinned to an exact version**.
# The secure setup installs `@anthropic-ai/claude-code@latest`
# because each release carries the newest permission-rule, sandbox,
# and prompt-injection fixes — pinning the agent runtime to an
# older build would *increase* the framework's security lag, not
# reduce it. Instead of a pin it carries a `min_version` floor: the
# oldest release whose permission-rule / sandbox semantics the
# secure setup relies on. When the setup is driven from Claude Code
# itself, `setup-isolated-setup-verify` HARD-FAILS if the running
# claude-code is below that floor (see its `[tools.claude-code]`
# table). Only the low-level sandbox primitives (`bubblewrap`,
# `socat`), where reproducibility and settle-time matter more than
# chasing the newest build, carry an exact `version` pin here.
#
# Adopters consume this file by:
#   1. Reading the versions in `docs/setup/secure-agent-setup.md` and installing
#      them on the host (the doc has the install commands per distro).
#   2. Running `tools/agent-isolation/check-tool-updates.sh` weekly
#      (or via `/schedule`) to surface upstream releases that have
#      themselves aged past each tool's cooldown — those are
#      candidates for the next intentional bump.
#
# To bump a tool: only when the new upstream version was released at
# least the tool's `cooldown_days` ago, AND the framework maintainer
# wants to upgrade. Update the `version` and `released` fields
# together, then bump the `pinned_at` field below to today.

# When this file was last touched. The check script uses this as the
# minimum age the entries below claim to satisfy.
pinned_at = "2026-07-08"

[tools.bubblewrap]
version = "0.11.2"
released = "2026-04-23"
purpose = """
Linux user-namespace sandbox. The strongest layer of credential
isolation: enforces the `denyRead` / `allowRead` filesystem rules
in `.claude/settings.json` for every Bash subprocess Claude Code
spawns. Required for the `sandbox.enabled: true` setting to
actually mean anything on Linux; macOS uses native Seatbelt
instead and does not need bubblewrap.
"""
docs = "https://github.com/containers/bubblewrap"
upstream_releases = "https://api.github.com/repos/containers/bubblewrap/releases"
# Install commands per distro (use the package manager's syntax for
# requesting a specific version where supported). See
# `docs/setup/secure-agent-setup.md` for adopter-facing install steps.
install.apt = "apt-get install --no-install-recommends bubblewrap=0.11.2-*"
install.dnf = "dnf install bubblewrap-0.11.2"
install.brew = "# macOS does not need bubblewrap; it uses Seatbelt."
install.from_source = "https://github.com/containers/bubblewrap/releases/tag/v0.11.2"

[tools.socat]
version = "1.8.1.3"
released = "2026-06-26"
purpose = """
TCP relay used by Claude Code's sandbox network proxy to enforce
the `sandbox.network.allowedDomains` allowlist. Without socat the
sandboxed session has no network at all (which is sometimes a
fine outcome). Linux only; macOS does not need it.
"""
docs = "http://www.dest-unreach.org/socat/"
upstream_releases = "http://www.dest-unreach.org/socat/download/"
install.apt = "apt-get install --no-install-recommends socat=1.8.1.3-*"
install.dnf = "dnf install socat-1.8.1.3"
install.from_source = "http://www.dest-unreach.org/socat/download/socat-1.8.1.3.tar.gz"

[tools.claude-code]
# NOT an exact-version pin — `min_version` is a hard floor, not a
# version to install. The secure setup installs `@latest` (see
# `install.npm` below); the floor is the oldest release whose
# permission-rule / sandbox / prompt-injection semantics the secure
# setup relies on. `setup-isolated-setup-verify` HARD-FAILS (not a
# ⚠) when driven from Claude Code and the running claude-code is
# below this floor — the secure setup's guarantees do not hold on an
# older runtime, so the run stops. Raise the floor only when the
# framework starts to depend on behaviour from a newer release.
min_version = "2.1.202"
released = "2026-07-06"  # release date of the min_version floor
purpose = """
The agent runtime itself. The secure setup's permission-rule
semantics, sandbox flags, and prompt-injection mitigations depend
on runtime behaviour present from `min_version` onward; an older
build silently weakens the effective security posture, which is why
the floor is enforced as a hard failure rather than a warning.
Install `@latest` to stay comfortably ahead of the floor.
"""
docs = "https://code.claude.com/docs/"
upstream_releases = "https://api.github.com/repos/anthropics/claude-code/releases"
# Claude Code is distributed via npm; use `--no-save` so the global
# install doesn't drift the local lockfile of any project the user
# installs from. Always `@latest` — never a version pin.
install.npm = "npm install -g --no-save @anthropic-ai/claude-code@latest"
